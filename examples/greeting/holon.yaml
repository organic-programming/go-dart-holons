# ── Identity ──────────────────────────────────────────
schema: holon/v0
uuid: "1924879e-1526-41df-9e89-82724e803712"
given_name: gudule
family_name: Greeting-Godart
motto: Greets users in 56 languages — Go backend, Flutter frontend.
composer: B. ALTER
clade: deterministic/pure
status: draft
born: "2026-02-20"

# ── Lineage ───────────────────────────────────────────
parents: []
reproduction: manual
generated_by: manual

# ── Description ───────────────────────────────────────
description: |
  A composite Godart holon: a Go gRPC daemon (greeting-daemon) paired
  with a Flutter UI (greeting-godart). Together they form a single
  application that greets users in 56 languages. The daemon serves the
  GreetingService contract; the Flutter app dials it over stdio pipes
  (desktop) or Unix sockets (mobile).

# ── Operational ───────────────────────────────────────
kind: composite
build:
  runner: recipe
  defaults:
    target: macos
    mode: debug
  members:
    - id: daemon
      path: greeting-daemon
      type: holon
    - id: app
      path: greeting-godart
      type: component
  targets:
    macos:
      steps:
        - build_member: daemon
        - copy:
            from: greeting-daemon/.op/build/bin/gudule-daemon-greeting-godart
            to: greeting-godart/build/gudule-daemon-greeting-godart
        - exec:
            cwd: greeting-godart
            argv: ["flutter", "pub", "get"]
        - exec:
            cwd: greeting-godart
            argv: ["flutter", "build", "macos", "--debug"]
        - copy:
            from: greeting-daemon/.op/build/bin/gudule-daemon-greeting-godart
            to: greeting-godart/build/macos/Build/Products/Debug/gudule-greeting-godart.app/Contents/Resources/gudule-daemon-greeting-godart
        - assert_file:
            path: greeting-godart/build/macos/Build/Products/Debug/gudule-greeting-godart.app
    windows:
      steps:
        - build_member: daemon
        - exec:
            cwd: greeting-godart
            argv: ["flutter", "pub", "get"]
        - exec:
            cwd: greeting-godart
            argv: ["flutter", "build", "windows", "--debug"]
        - copy:
            from: greeting-daemon/.op/build/bin/gudule-daemon-greeting-godart
            to: greeting-godart/build/windows/x64/runner/Debug/gudule-daemon-greeting-godart.exe
        - assert_file:
            path: greeting-godart/build/windows/x64/runner/Debug/gudule-greeting-godart.exe
requires:
  commands: [go, flutter]
  files: [greeting-daemon/go.mod, greeting-godart/pubspec.yaml]
artifacts:
  primary: greeting-godart/build/macos/Build/Products/Debug/gudule-greeting-godart.app
